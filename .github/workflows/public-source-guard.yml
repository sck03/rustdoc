name: Public source guard

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify public repository boundary
        shell: pwsh
        run: ./scripts/github/verify-public-source.ps1
