version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    groups:
      dotnet-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/export-doc-web
    schedule:
      interval: weekly
    groups:
      web-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/export-doc-tauri
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /apps/export-doc-tauri/src-tauri
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /tools/excel-analyzer-rs
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /deploy/container
    schedule:
      interval: weekly
