name: Public source guard

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: public-source-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify public repository boundary
        shell: pwsh
        run: ./scripts/github/verify-public-source.ps1
