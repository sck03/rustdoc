name: Build and publish container images

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像与程序版本（例如 0.1.2，可输入 v0.1.2）'
        required: true
        type: string
      publish_latest:
        description: '同时更新 latest 标签'
        required: true
        default: true
        type: boolean

concurrency:
  group: container-images-${{ inputs.version }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: deploy/container/Dockerfile.api
          - component: web
            dockerfile: deploy/container/Dockerfile.web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify public repository boundary
        shell: pwsh
        run: ./scripts/github/verify-public-source.ps1

      - name: Set up Node.js for version synchronization
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate and apply requested version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${REQUESTED_VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "版本格式无效：$REQUESTED_VERSION。请使用 0.1.2 或 0.1.2-beta.1。" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          node scripts/sync-version.mjs "$VERSION"

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/export-doc-manager-${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: true
          sbom: true

      - name: Write release summary
        shell: bash
        run: |
          echo "## ExportDocManager Docker 镜像" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本：\`${{ steps.version.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 组件：\`${{ matrix.component }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 架构：\`linux/amd64, linux/arm64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- latest：\`${{ inputs.publish_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
