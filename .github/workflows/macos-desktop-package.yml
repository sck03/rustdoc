name: Build macOS desktop package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '程序版本（例如 0.1.2，可输入 v0.1.2）'
        required: true
        type: string
      architecture:
        description: 'macOS 架构（两种架构均内置官方 Chrome Headless Shell）'
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
      edition:
        description: '产品功能版本'
        required: true
        default: Full
        type: choice
        options:
          - Full
          - Document
          - Sales
      publish_release:
        description: '同时上传到对应版本的 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/desktop-package-reusable.yml
    with:
      platform: macos
      runner: ${{ inputs.architecture == 'arm64' && 'macos-15' || 'macos-15-intel' }}
      runtime_identifier: ${{ inputs.architecture == 'arm64' && 'osx-arm64' || 'osx-x64' }}
      rust_target: ${{ inputs.architecture == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
      chrome_platform: ${{ inputs.architecture == 'arm64' && 'mac-arm64' || 'mac-x64' }}
      bundle_targets: dmg
      version: ${{ inputs.version }}
      architecture: ${{ inputs.architecture }}
      edition: ${{ inputs.edition }}
      include_browser: true
      publish_release: ${{ inputs.publish_release }}
