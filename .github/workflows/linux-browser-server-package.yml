name: Build Linux browser server package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '程序版本（例如 0.1.2）'
        required: true
        type: string
      architecture:
        description: 'Linux架构（ARM64内置标记明确的Chromium ARM64）'
        required: true
        default: x64
        type: choice
        options:
          - x64
          - arm64
      publish_release:
        description: '同时上传到 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/browser-server-package-reusable.yml
    with:
      platform: linux
      runner: ${{ inputs.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
      runtime_identifier: ${{ inputs.architecture == 'arm64' && 'linux-arm64' || 'linux-x64' }}
      rust_target: ${{ inputs.architecture == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
      chrome_platform: ${{ inputs.architecture == 'arm64' && 'chromium-linux-arm64' || 'linux64' }}
      version: ${{ inputs.version }}
      publish_release: ${{ inputs.publish_release }}
