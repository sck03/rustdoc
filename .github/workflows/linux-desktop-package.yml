name: Build Linux desktop package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '程序版本（例如 0.1.2，可输入 v0.1.2）'
        required: true
        type: string
      edition:
        description: '产品功能版本'
        required: true
        default: Full
        type: choice
        options:
          - Full
          - Document
          - Sales
      publish_release:
        description: '同时上传到对应版本的 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/desktop-package-reusable.yml
    with:
      platform: linux
      runner: ubuntu-latest
      runtime_identifier: linux-x64
      rust_target: x86_64-unknown-linux-gnu
      chrome_platform: linux64
      bundle_targets: deb,appimage
      version: ${{ inputs.version }}
      architecture: x64
      edition: ${{ inputs.edition }}
      include_browser: true
      publish_release: ${{ inputs.publish_release }}
