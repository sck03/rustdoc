name: Build Linux browser server package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '程序版本（例如 0.1.2）'
        required: true
        type: string
      publish_release:
        description: '同时上传到 GitHub Release'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    uses: ./.github/workflows/browser-server-package-reusable.yml
    with:
      platform: linux
      runner: ubuntu-latest
      runtime_identifier: linux-x64
      chrome_platform: linux64
      version: ${{ inputs.version }}
      publish_release: ${{ inputs.publish_release }}
